name: Generate XML Sitemap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# This tells the runner to use Node 24 even if an action is lagging behind
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the repo
      # Updated from v4 to v5 to support Node 24
      uses: actions/checkout@v5 
      with:
        fetch-depth: 0 

    - name: Generate the sitemap
      id: sitemap
      uses: cicirello/generate-sitemap@v1
      with:
        base-url-path: https://upnextsg.github.io/sg-vibes/
        
    - name: Commit and push
      run: |
        if [[ `git status --porcelain sitemap.xml` ]]; then
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add sitemap.xml
          git commit -m "Automated sitemap update (Node 24)"
          git push
        fi
